<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat | StudNet</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Stud<span>Net</span></div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Flux</a></li>
            <li><a href="search.html">Rechercher</a></li>
            <li>
                <a href="chat-list.html" class="active">
                    Messages <span id="msgBadge" class="badge hidden">0</span>
                </a>
            </li>
            <li><a href="events.html">Événements</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="profile.html">Profil</a></li>
            <li><a href="about.html">À Propos</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
        <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    </nav>

    <div class="chat-screen">
        <header class="chat-header">
            <div class="user-meta">
                <a href="chat-list.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
                <div class="avatar-small" id="conversationAvatar">ST</div>
                <div class="status">
                    <h4 id="conversationTitle">Discussion</h4>
                    <span id="conversationSubtitle">Messages StudNet</span>
                </div>
            </div>
            <div class="header-icons">
                <i class="fas fa-phone"></i>
                <i class="fas fa-video"></i>
                <i class="fas fa-info-circle"></i>
            </div>
        </header>

        <div id="messageDisplay" class="messages-area"></div>

        <footer class="input-container">
            <div class="tool-icons">
                <input type="file" id="imageInput" hidden>
                <i class="fas fa-plus-circle" onclick="document.getElementById('imageInput').click()"></i>
                <i class="fas fa-camera" id="cameraBtn"></i>
                <i class="fas fa-image"></i>
            </div>
            <div class="input-wrapper">
                <input type="text" id="msgContent" placeholder="Aa">
                <i class="far fa-smile"></i>
            </div>
            <div class="actions">
                <i class="fas fa-microphone" id="voiceBtn"></i>
                <i class="fas fa-paper-plane" id="sendBtn"></i>
            </div>
        </footer>
    </div>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="assets/js/utils/auth.js"></script>
    <script src="assets/js/config/service-registry.js"></script>
    <script src="assets/js/utils/ui.js"></script>
    <script src="assets/js/utils/http-client.js"></script>
    <script src="assets/js/utils/event-bus.js"></script>
    <script src="assets/js/dtos/dtos.js"></script>
    <script src="assets/js/services/auth.service.js"></script>
    <script src="assets/js/services/chat.service.js"></script>
    <script src="assets/js/services/domain-services.js"></script>
    <script src="assets/js/adapters/chat.adapter.js"></script>
</body>
</html>
