<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Mon Profil — StudNet</title>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Stud<span>Net</span></div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Flux</a></li>
            <li><a href="search.html">Rechercher</a></li>
            <li>
                <a href="chat-list.html">
                    Messages <span id="msgBadge" class="badge hidden">0</span>
                </a>
            </li>
            <li><a href="events.html">Événements</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="profile.html" class="active">Profil</a></li>
            <li><a href="about.html">À Propos</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
        <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    </nav>

    <div class="layout">
        <main class="profile-container">
            <section class="profile-header card">
                <div class="cover-photo"></div>
                <div class="profile-info-main">
                    <div class="profile-avatar-wrapper">
                        <img src="default-avatar.png" id="userAvatar" alt="Avatar">
                        <label for="avatarInput" class="edit-avatar-btn">
                            <i class="fas fa-camera"></i>
                        </label>
                        <input type="file" id="avatarInput" hidden>
                    </div>
                    <div class="name-section">
                        <h1 id="userName">Chargement...</h1>
                        <p id="userBio">Étudiant à l'Université</p>
                    </div>
                   
                </div>
            </section>

            <div class="profile-content-grid">
                <aside class="profile-details card">
                    <h3>À propos</h3>
                    <ul class="details-list">
                        <li><i class="fas fa-graduation-cap"></i> <span id="userMajor">Génie Logiciel</span></li>
                        <li><i class="fas fa-envelope"></i> <span id="userEmail">email@exemple.com</span></li>
                        <li><i class="fas fa-calendar-alt"></i> Membre depuis <span id="userJoinDate">Janvier 2024</span></li>
                    </ul>
                    <button class="btn-edit-profile" id="openEditModal">Modifier le profil</button>
                </aside>

                <section class="profile-feed">
                    <div class="feed-tabs">
                        <button class="tab active">Publications</button>
                        
                    </div>
                    <div id="userPosts" class="posts-container">
                        </div>
                </section>
            </div>
        </main>
    </div>
    <script src="assets/js/utils/auth.js"></script>
    <script src="assets/js/config/service-registry.js"></script>
    <script src="assets/js/utils/ui.js"></script>
    <script src="assets/js/utils/http-client.js"></script>
    <script src="assets/js/dtos/dtos.js"></script>
    <script src="assets/js/services/auth.service.js"></script>
    <script src="assets/js/services/post.service.js"></script>
    <script src="assets/js/services/domain-services.js"></script>
    <script src="assets/js/adapters/profile.adapter.js"></script>
</body>
</html>
