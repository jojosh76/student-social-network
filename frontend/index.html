<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | StudNet</title>
    <link rel="stylesheet" href="assets/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="header">
                <h1>Stud<span>Net</span></h1>
                <p>Happy to see you !</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Universitaire</label>
                    <input type="email" id="email" placeholder="nom@etudiant.univ.fr" required>
                </div>
                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="options">
                    <label><input type="checkbox"> Se souvenir de moi</label>
                    
                </div>
                <button type="submit" class="btn-login">Se connecter</button>
            </form>
            <p class="footer-text">Pas encore membre ? <a href="register.html">Créer un compte</a></p>
        </div>
    </div>
    <script src="assets/js/config/service-registry.js"></script>
    <script src="assets/js/utils/ui.js"></script>
    <script src="assets/js/utils/http-client.js"></script>
    <script src="assets/js/dtos/dtos.js"></script>
    <script src="assets/js/services/auth.service.js"></script>
    <script src="assets/js/adapters/login.adapter.js"></script>
</body>
</html>
