<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   
    <title>StudNet — Recherche Globale</title>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Stud<span>Net</span></div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Flux</a></li>
            <li><a href="search.html" class="active">Rechercher</a></li>
            <li>
                <a href="chat-list.html">
                    Messages <span id="msgBadge" class="badge hidden">0</span>
                </a>
            </li>
            <li><a href="events.html">Événements</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="profile.html">Profil</a></li>
            <li><a href="about.html">À Propos</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
        <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    </nav>

    <div class="layout">
        <div class="search-page-container">
            <div class="search-box card">
                <div class="input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="globalSearchInput" placeholder="Rechercher des étudiants, des cours, des événements...">
                </div>
                
                <div class="search-filters">
                    <button class="filter-btn active" data-filter="all">Tout</button>
                    <button class="filter-btn" data-filter="user">Étudiants</button>
                    <button class="filter-btn" data-filter="post">Publications</button>
                    <button class="filter-btn" data-filter="event">Événements</button>
                </div>
            </div>

            <div id="searchResults" class="results-grid">
                <div class="search-empty">
                    <p>Commencez à taper pour voir les résultats...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/utils/auth.js"></script>
    <script src="assets/js/config/service-registry.js"></script>
    <script src="assets/js/utils/ui.js"></script>
    <script src="assets/js/utils/http-client.js"></script>
    <script src="assets/js/services/auth.service.js"></script>
    <script src="assets/js/services/domain-services.js"></script>
    <script src="assets/js/adapters/search.adapter.js"></script>
</body>
</html>
