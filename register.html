<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | StudNet</title>
    <link rel="stylesheet" href="register.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="register-card">
            <h1>Rejoindre <span>StudNet</span></h1>
            <p>Connecte-toi avec ton campus.</p>
            <form id="registerForm">
                <div class="row">
                    <div class="input-group">
                        <label>Prénom</label>
                        <input type="text" id="firstname" required>
                    </div>
                    <div class="input-group">
                        <label>Nom</label>
                        <input type="text" id="lastname" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Filière</label>
                    <select id="major">
                        <option value="info">Informatique</option>
                        <option value="droit">Droit</option>
                        <option value="energie">Energie renouvelable</option>
                        <option value="med">Médecine</option>
                        <option value="bms">BMS</option>
                        <option value="eco">Économie</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Email Académique</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-reg">Créer mon profil</button>
            </form>
            <p class="footer-text">Déjà inscrit ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
