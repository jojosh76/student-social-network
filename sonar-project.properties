sonar.projectKey=jojosh76_student-social-network
sonar.organization=jojosh76

# Dit à SonarQube de scanner tout le projet
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Indique où exclure l'analyse (on ne veut pas analyser les bibliothèques téléchargées ni les fichiers de tests eux-mêmes)
sonar.exclusions=**/node_modules/**, **/*.spec.js, **/*.test.js, coverage/**

# Le chemin magique pour Express/JavaScript où se trouve le rapport de couverture
sonar.javascript.lcov.reportPaths=coverage/lcov.info
