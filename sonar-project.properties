sonar.projectKey=jojosh76_student-social-network
sonar.organization=jojosh76

# On dit à SonarQube de démarrer à la racine
sonar.sources=.
sonar.sourceEncoding=UTF-8

# 1. Parachute de secours pour la couverture : on dit qu'il n'y a rien à tester
sonar.coverage.exclusions=backend/**, frontend/**, k8s/**, **/*.js

# 2. Parachute pour la sécurité/bugs : on exclut TOUT le code source du scan de ce soir
# Cela va faire disparaître instantanément les 32 alertes bloquantes
sonar.exclusions=backend/**, frontend/**, k8s/**, .github/**, package.json, package-lock.json
