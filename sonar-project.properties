sonar.projectKey=jojosh76_student-social-network
sonar.organization=jojosh76

# Dit à SonarQube de scanner tout le projet à partir de la racine
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Force SonarQube à analyser le JavaScript du backend
sonar.language=js

# 1. IMPORTANT : Liste des fichiers à exclure du calcul de la couverture 
# (On ne veut pas tester les modules externes ni les fichiers de tests eux-mêmes)
sonar.exclusions=**/node_modules/**, backend/node_modules/**, frontend/node_modules/**, **/coverage/**, **/*.test.js, **/*.spec.js

# 2. LE CHEMIN CRUCIAL : Indique où Jest a créé le rapport LCOV
# Utilise des slashs (/) même si le serveur GitHub Actions tourne sous Windows
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
