name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      # 1. Configurer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Mettez la version de Node que vous utilisez

      # 2. Installer les dépendances du projet
      - name: Install dependencies
        run: npm ci

      # 3. Exécuter les tests et générer le rapport de couverture (coverage)
      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false
        # Note : Si vous utilisez Vitest ou un autre outil, remplacez par votre commande (ex: npx vitest run --coverage)

      # 4. Scanner avec SonarQube (qui va maintenant trouver le rapport de test)
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
