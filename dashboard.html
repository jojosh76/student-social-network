<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | StudNet</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">Stud<span>Net</span></div>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="active">Flux</a></li>
            <li><a href="search.html">Rechercher</a></li>
            <li>
                <a href="chat-list.html">
                    Messages <span id="msgBadge" class="badge hidden">0</span>
                </a>
            </li>
            <li><a href="events.html">Événements</a></li>
            <li><a href="notifications.html">Notifications</a></li>
            <li><a href="profile.html">Profil</a></li>
            <li><a href="about.html">À Propos</a></li>
            <li><a href="#" id="logoutBtn" title="Déconnexion"><i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
        <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    </nav>

    <div class="layout">

        <!-- SIDEBAR GAUCHE : Profil + Navigation -->
        <aside class="sidebar-left">
            <div class="profile-card card">
                <div class="profile-avatar-wrap">
                    <div class="profile-avatar" id="profileAvatar">?</div>
                    <div class="online-indicator"></div>
                </div>
                <h3 id="profileName">Chargement...</h3>
                <p id="profileMajor" class="profile-meta">—</p>
                <div class="profile-stats">
                    <div class="stat">
                        <span id="statPosts">0</span>
                        <small>Posts</small>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat">
                        <span id="statFriends">0</span>
                        <small>Amis</small>
                    </div>
                </div>
            </div>

            <nav class="side-nav card">
                <a href="#" class="side-nav-item active" data-filter="all">
                    <i class="fas fa-stream"></i> <span>Tout le flux</span>
                </a>
                <a href="#" class="side-nav-item" data-filter="cours">
                    <i class="fas fa-book-open"></i> <span>Cours & Ressources</span>
                </a>
                <a href="#" class="side-nav-item" data-filter="evenement">
                    <i class="fas fa-calendar-alt"></i> <span>Événements</span>
                </a>
                <a href="#" class="side-nav-item" data-filter="annonce">
                    <i class="fas fa-bullhorn"></i> <span>Annonces</span>
                </a>
            </nav>
        </aside>

        <!-- MAIN FEED -->
        <main class="main-content">

            <!-- COMPOSER -->
            <div class="post-composer card">
                <div class="composer-top">
                    <div class="composer-avatar" id="composerAvatar">?</div>
                    <input type="text" id="postInput"
                        placeholder="Partage quelque chose avec le campus..." 
                        class="composer-input">
                </div>

                <div id="imagePreviewContainer" class="image-preview-container hidden">
                    <img id="imagePreview" src="" alt="Aperçu">
                    <button id="removeImage" class="remove-img-btn"><i class="fas fa-times"></i></button>
                </div>

                <div class="composer-actions">
                    <div class="composer-left-actions">
                        <label class="composer-btn" for="postImage" title="Ajouter une image">
                            <i class="fas fa-image"></i> <span>Photo</span>
                            <input type="file" id="postImage" accept="image/*" hidden>
                        </label>

                        <div class="post-type-wrapper">
                            <button class="composer-btn" id="postTypeBtn">
                                <i class="fas fa-tag"></i> <span id="postTypeLabel">Général</span>
                                <i class="fas fa-chevron-down" style="font-size:0.7rem; margin-left:4px;"></i>
                            </button>
                            <div class="type-dropdown hidden" id="typeDropdown">
                                <div class="type-option" data-type="general" data-label="Général">
                                    <i class="fas fa-stream"></i> Général
                                </div>
                                <div class="type-option" data-type="cours" data-label="Cours">
                                    <i class="fas fa-book-open"></i> Cours
                                </div>
                                <div class="type-option" data-type="evenement" data-label="Événement">
                                    <i class="fas fa-calendar-alt"></i> Événement
                                </div>
                                <div class="type-option" data-type="annonce" data-label="Annonce">
                                    <i class="fas fa-bullhorn"></i> Annonce
                                </div>
                            </div>
                        </div>
                    </div>

                    <button class="btn-publish" id="publishBtn">
                        <i class="fas fa-paper-plane"></i> Publier
                    </button>
                </div>
            </div>

            <!-- FEED -->
            <div id="postsFeed" class="posts-feed">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> Chargement du flux...
                </div>
            </div>

        </main>

        <!-- SIDEBAR DROITE : Widgets -->
        <aside class="sidebar-right">

            <div class="widget card">
                <h4 class="widget-title">
                    <i class="fas fa-circle" style="color: #2ecc71; font-size: 0.65rem;"></i>
                    Étudiants en ligne
                </h4>
                <div id="onlineUsers" class="online-users-list"></div>
            </div>

            <div class="widget card">
                <h4 class="widget-title">
                    <i class="fas fa-calendar-check"></i> Prochains événements
                </h4>
                <div id="upcomingEvents" class="events-list"></div>
            </div>

        </aside>

    </div>

    <script src="assets/js/utils/auth.js"></script>
    <script src="assets/js/adapters/dashboard.adapter.js"></script>
</body>
</html>
