# ====================== GATEWAY ======================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campuslink-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campuslink-gateway
  template:
    metadata:
      labels:
        app: campuslink-gateway
    spec:
      containers:
      - name: gateway
        image: jefflionel40/campuslink-gateway:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "300m"
            memory: "400Mi"
          limits:
            cpu: "600m"
            memory: "800Mi"
        imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: campuslink-gateway
spec:
  selector:
    app: campuslink-gateway
  ports:
  - port: 3000
    targetPort: 3000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: campuslink-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: campuslink-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

# ====================== AUTH ======================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campuslink-auth
spec:
  replicas: 2
  selector:
