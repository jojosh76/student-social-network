# ================== GATEWAY ==================
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  name: campuslink-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: campuslink-gateway
  template:
    metadata:
  namespace: default
      labels:
        app: campuslink-gateway
    spec:
      containers:
      - name: gateway
        image: jefflionel40/campuslink-gateway:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  namespace: default
  name: campuslink-gateway
spec:
  selector:
    app: campuslink-gateway
  ports:
  - port: 3000
    targetPort: 3000

---
# ================== HPA for Gateway (Scales up to 2000 users simulation) ==================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  namespace: default
  name: campuslink-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: campuslink-gateway
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
---
